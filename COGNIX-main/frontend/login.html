<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COGNIX - Login</title>

<link rel="stylesheet" href="css/login.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="brand">

            <h1>COGNIX</h1>

            <p>
                AI-powered customer support platform.
            </p>

        </div>

        <div class="features">

            <div class="feature">
                🧠 Persistent Customer Memory
            </div>

            <div class="feature">
                ⚡ AI-Powered Support Agent
            </div>

            <div class="feature">
                📊 Customer Health Insights
            </div>

            <div class="feature">
                🎯 Personalized Resolutions
            </div>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <div class="form-container">

            <!-- <div class="logo-circle">
                M
            </div> -->

            <h2 id="formTitle">
                Welcome Back
            </h2>

            <p id="formSubtitle">
                Sign in to access your support workspace.
            </p>

            <!-- FORM -->

            <form id="authForm">

                <div id="nameField" class="hidden">

                    <input
                        id="fullName"
                        type="text"
                        placeholder="Full Name"
                    >

                </div>

                <input
                    id="email"
                    type="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    id="password"
                    type="password"
                    placeholder="Password"
                    required
                >

                <div id="confirmPasswordField" class="hidden">

                    <input
                        id="confirmPassword"
                        type="password"
                        placeholder="Confirm Password"
                    >

                </div>

                <button
                    type="submit"
                    class="primary-btn"
                >
                    Sign In
                </button>

            </form>

            <!-- Divider -->

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Google Login -->

            <button
                type="button"
                class="google-btn"
            >

                <svg
                    width="22"
                    height="22"
                    viewBox="0 0 48 48"
                >

                    <path fill="#FFC107"
                    d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>

                    <path fill="#FF3D00"
                    d="M6.3 14.7l6.6 4.8C14.7 15 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.4 4.3-17.7 10.7z"/>

                    <path fill="#4CAF50"
                    d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3c-2.1 1.6-4.7 2.5-7.3 2.5-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.6 39.6 16.3 44 24 44z"/>

                    <path fill="#1976D2"
                    d="M43.6 20.5H42V20H24v8h11.3c-1.1 3-3.5 5.3-6.7 6.8l6.3 5.3C38.5 36.8 44 31 44 24c0-1.3-.1-2.4-.4-3.5z"/>

                </svg>

                Continue with Google

            </button>

            <!-- Toggle -->

            <div class="switch-form">

                <span id="switchText">
                    Don't have an account?
                </span>

                <button
                    id="toggleBtn"
                    type="button"
                >
                    Sign Up
                </button>

            </div>

        </div>

    </div>

</div>

<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Your JS -->

<script src="js/login.js"></script>

</body>
</html>
