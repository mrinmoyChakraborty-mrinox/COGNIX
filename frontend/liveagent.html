<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Agent Session · MemoryDesk</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/liveagent.css" />
  </head>
  <body>
    <div class="app">
      <!-- ============ SIDEBAR ============ -->
      <aside class="sidebar">
        <div class="logo">M</div>

        <nav class="sidebar-nav">
          <button class="nav-icon" title="Dashboard" onclick="window.location.href='./dashboard.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"></rect><rect width="7" height="5" x="14" y="3" rx="1"></rect><rect width="7" height="9" x="14" y="12" rx="1"></rect><rect width="7" height="5" x="3" y="16" rx="1"></rect></svg>
          </button>
          <button class="nav-icon active" title="Live Sessions" onclick="window.location.href='./liveagent.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"></path><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11"></path></svg>
          </button>
          <button class="nav-icon" title="Memory Inspector" onclick="window.location.href='./memory_inspector.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18V5m3 8a4.17 4.17 0 0 1-3-4a4.17 4.17 0 0 1-3 4m8.598-6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"></path><path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"></path><path d="M18 18a4 4 0 0 0 2-7.464"></path><path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"></path><path d="M6 18a4 4 0 0 1-2-7.464"></path><path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"></path></svg>
          </button>
          <button class="nav-icon" title="Customers" onclick="window.location.href='./customer_profile.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M16 3.128a4 4 0 0 1 0 7.744M22 21v-2a4 4 0 0 0-3-3.87"></path><circle cx="9" cy="7" r="4"></circle></svg>
          </button>
        </nav>
        <button class="nav-icon logout" title="Log out" onclick="var c=window.supabase?.createClient?.(window.CONFIG?.SUPABASE_URL||'',window.CONFIG?.SUPABASE_ANON_KEY||'');c?.auth?.signOut();window.location.href='./login.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m16 17l5-5l-5-5m5 5H9m0 9H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path></svg>
        </button>
      </aside>

      <!-- ============ MAIN ============ -->
      <div class="main">
        <!-- Top bar -->
        <header class="topbar">
          <span class="topbar-title" id="sessionTitle">Session</span>

          <div class="topbar-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21l-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
            <span>Search tickets, customers…</span>
          </div>

          <div class="topbar-actions">
            <button class="icon-btn" title="Notifications">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M10.268 21a2 2 0 0 0 3.464 0m-10.47-5.674A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"></path></svg>
              <span class="notif-dot"></span>
            </button>
            <!-- <img
              src="https://storage.googleapis.com/banani-avatars/avatar/male/25-35/North American/0"
              class="avatar avatar-sm"
              alt="Agent avatar"
            /> -->
           <button class="icon-btn" id="resolveTicketBtn" title="Resolve ticket" style="display:none">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
           </button>
           <img
            id="agentAvatar"
            class="avatar avatar-sm"
            alt="Agent avatar"
          />
          </div>
        </header>

        <!-- Content: chat + memory panel -->
        <div class="content">
          <!-- ============ CHAT ============ -->
          <section class="chat">
            <div class="chat-messages">
      </div>
            <!-- Reply bar -->
            <div class="reply-bar">
              <textarea class="reply-input" rows="1" placeholder="Type a reply…"></textarea>
              <button class="ai-suggest-btn" id="aiSuggestBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594zM20 2v4m2-2h-4"></path><circle cx="4" cy="20" r="2"></circle></svg>
                AI suggest reply
              </button>
            </div>
          </section>

          <!-- ============ MEMORY PANEL ============ -->
          <aside class="memory-panel">
            <!-- Profile -->
            <div class="profile">
              <img
                id="customerAvatar"
                src="https://storage.googleapis.com/banani-avatars/avatar/male/25-35/South Asian/1"
                class="avatar avatar-lg"
                alt="Customer"
              />
              <div class="profile-info">
                <div class="profile-name" id="customerName">Customer</div>
                <div class="profile-meta" id="customerEmail">Loading...</div>
              </div>
              <div class="frustration-ring" id="profileFrustrationRing">
                <svg width="56" height="56" style="transform: rotate(-90deg)">
                  <circle cx="28" cy="28" r="23" fill="none" stroke="#e2e5ea" stroke-width="5"></circle>
                  <circle id="frustrationCircle" cx="28" cy="28" r="23" fill="none" stroke="#ef4444" stroke-width="5"
                    stroke-dasharray="0 144.51" stroke-linecap="round"></circle>
                </svg>
                <span class="frustration-value" id="profileFrustrationScore">--</span>
              </div>
            </div>

            <!-- Dynamic: populated from /customers/{id}/memories -->
            <div class="panel-section" id="sidebarFacts"></div>

            <!-- Dynamic: populated from /customers/{id}/tickets -->
            <div class="panel-section" id="sidebarTimeline"></div>

            <!-- Dynamic: current session notes, updated from WebSocket memory.update -->
            <div class="panel-section" id="sidebarSessionNotes"></div>

            <!-- Memory Retrieval Visualization -->
            <div class="panel-section" id="memoryPanel"></div>

            <!-- Escalation Banner -->
            <div id="escalationBanner" class="panel-section hidden"></div>
          </aside>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49"></script>
    <script type="module" src="./js/config.js"></script>
    <script type="module" src="./js/liveagent.js"></script>

  </body>
</html>
