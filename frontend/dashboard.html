<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COGNIX — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-logo">C</div>
        <button class="sidebar-btn active" title="Inbox" onclick="window.location.href='./dashboard.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-6l-2 3h-4l-2-3H2"></path>
            <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11"></path>
          </svg>
        </button>
        <button class="sidebar-btn" title="Customers" onclick="window.location.href='./dashboard.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M16 3.128a4 4 0 0 1 0 7.744M22 21v-2a4 4 0 0 0-3-3.87"></path>
            <circle cx="9" cy="7" r="4"></circle>
          </svg>
        </button>
        <button class="sidebar-btn" title="MemoryDesk" onclick="window.location.href='./memory_inspector.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 18V5m3 8a4.17 4.17 0 0 1-3-4a4.17 4.17 0 0 1-3 4m8.598-6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"></path>
            <path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"></path>
            <path d="M18 18a4 4 0 0 0 2-7.464"></path>
            <path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"></path>
            <path d="M6 18a4 4 0 0 1-2-7.464"></path>
            <path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"></path>
          </svg>
        </button>
        <button class="sidebar-btn" title="Analytics" onclick="window.location.href='./dashboard.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 21v-6m7 6V3m7 18V9"></path>
          </svg>
        </button>
        <button class="sidebar-btn" title="Settings" onclick="window.location.href='./dashboard.html'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0a2.34 2.34 0 0 0 3.319 1.915a2.34 2.34 0 0 1 2.33 4.033a2.34 2.34 0 0 0 0 3.831a2.34 2.34 0 0 1-2.33 4.033a2.34 2.34 0 0 0-3.319 1.915a2.34 2.34 0 0 1-4.659 0a2.34 2.34 0 0 0-3.32-1.915a2.34 2.34 0 0 1-2.33-4.033a2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <div class="sidebar-bottom">
          <button class="sidebar-btn" id="logoutBtn" title="Log out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="m16 17l5-5l-5-5m5 5H9m0 9H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Main -->
      <div class="main">
        <!-- Topbar -->
        <div class="topbar">
          <span class="topbar-title" id="welcomeText">
            <span class="skeleton skeleton-text"></span>
          </span>
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="m21 21l-4.34-4.34"></path>
              <circle cx="11" cy="11" r="8"></circle>
            </svg>
            <span>Search tickets, customers…</span>
          </div>
          <div class="topbar-right">
            <button class="icon-btn" id="notifBell" title="Notifications">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.268 21a2 2 0 0 0 3.464 0m-10.47-5.674A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"></path>
              </svg>
              <span class="notif-dot"></span>
            </button>
            <div id="avatarWrapper">
              <div class="skeleton skeleton-avatar"></div>
            </div>
          </div>
        </div>

        <!-- Content -->
        <div class="content">
          <!-- Queue panel -->
          <div class="queue-panel">
            <div class="queue-header">
              <div>
                <h1 class="queue-title">Incoming queue</h1>
                <p class="queue-subtitle" id="queueSubtitle">Loading&hellip;</p>
              </div>
              <div class="agent-filter">
                <span>All agents</span>
                <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
                  <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </div>
            </div>

            <!-- Skeleton tickets -->
            <div class="ticket-list" id="ticketList">
              <div class="ticket-card skeleton-card">
                <div class="skeleton skeleton-avatar-lg"></div>
                <div class="ticket-body">
                  <div class="skeleton skeleton-line w-40"></div>
                  <div class="skeleton skeleton-line w-70"></div>
                  <div class="skeleton skeleton-line w-55"></div>
                </div>
                <div class="ticket-actions">
                  <div class="skeleton skeleton-ring"></div>
                  <div class="skeleton skeleton-btn"></div>
                </div>
              </div>
              <div class="ticket-card skeleton-card">
                <div class="skeleton skeleton-avatar-lg"></div>
                <div class="ticket-body">
                  <div class="skeleton skeleton-line w-50"></div>
                  <div class="skeleton skeleton-line w-65"></div>
                  <div class="skeleton skeleton-line w-45"></div>
                </div>
                <div class="ticket-actions">
                  <div class="skeleton skeleton-ring"></div>
                  <div class="skeleton skeleton-btn"></div>
                </div>
              </div>
              <div class="ticket-card skeleton-card">
                <div class="skeleton skeleton-avatar-lg"></div>
                <div class="ticket-body">
                  <div class="skeleton skeleton-line w-35"></div>
                  <div class="skeleton skeleton-line w-75"></div>
                  <div class="skeleton skeleton-line w-60"></div>
                </div>
                <div class="ticket-actions">
                  <div class="skeleton skeleton-ring"></div>
                  <div class="skeleton skeleton-btn"></div>
                </div>
              </div>
            </div>

            <!-- Error state -->
            <div id="queueError" class="error-banner hidden">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 8v4m0 4h.01"></path>
              </svg>
              <span id="queueErrorMsg">Failed to load queue.</span>
              <button id="queueRetryBtn" class="error-retry-btn">Retry</button>
            </div>

            <!-- Empty state -->
            <div id="queueEmpty" class="empty-state hidden">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-6l-2 3h-4l-2-3H2"></path>
                <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11"></path>
              </svg>
              <p>No customers waiting.</p>
            </div>
          </div>

          <!-- Trending issues -->
          <div class="side-panel">
            <div class="trending-card">
              <div class="trending-header">
                <span class="trending-title">Trending issues</span>
                <span class="trending-period">This week</span>
              </div>
              <div class="trending-list" id="trendingList">
                <div class="trending-row">
                  <span class="skeleton skeleton-line w-25"></span>
                  <div class="trending-bar-bg"><div class="skeleton skeleton-bar"></div></div>
                  <span class="skeleton skeleton-line w-10"></span>
                </div>
                <div class="trending-row">
                  <span class="skeleton skeleton-line w-30"></span>
                  <div class="trending-bar-bg"><div class="skeleton skeleton-bar"></div></div>
                  <span class="skeleton skeleton-line w-10"></span>
                </div>
                <div class="trending-row">
                  <span class="skeleton skeleton-line w-20"></span>
                  <div class="trending-bar-bg"><div class="skeleton skeleton-bar"></div></div>
                  <span class="skeleton skeleton-line w-10"></span>
                </div>
                <div class="trending-row">
                  <span class="skeleton skeleton-line w-28"></span>
                  <div class="trending-bar-bg"><div class="skeleton skeleton-bar"></div></div>
                  <span class="skeleton skeleton-line w-10"></span>
                </div>
                <div class="trending-row">
                  <span class="skeleton skeleton-line w-22"></span>
                  <div class="trending-bar-bg"><div class="skeleton skeleton-bar"></div></div>
                  <span class="skeleton skeleton-line w-10"></span>
                </div>
              </div>
              <div id="trendingError" class="error-banner hidden">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <path d="M12 8v4m0 4h.01"></path>
                </svg>
                <span>Failed to load trends.</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49"></script>
    <script type="module" src="./js/config.js"></script>
    <script type="module" src="./js/dashboard.js"></script>
  </body>
</html>
